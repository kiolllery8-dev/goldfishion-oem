name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Detect base path
        id: base
        run: |
          if [ -f web/public/CNAME ]; then
            echo "path=" >> $GITHUB_OUTPUT
            echo "Using custom domain — empty basePath"
          else
            echo "path=/${GITHUB_REPOSITORY##*/}" >> $GITHUB_OUTPUT
            echo "Using project pages — basePath=/${GITHUB_REPOSITORY##*/}"
          fi

      - name: Install
        run: npm ci || npm install

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.path }}
        run: |
          npm run build
          touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
